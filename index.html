<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Invited!</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4ec 0%, #f3e5f5 50%, #e8eaf6 100%);
      font-family: 'Georgia', serif;
      padding: 20px;
    }

    .hint {
      margin-bottom: 16px;
      color: #666;
      font-size: 14px;
      opacity: 0;
      animation: fadeInHint 0.5s ease 3.5s forwards;
    }

    @keyframes fadeInHint {
      to { opacity: 1; }
    }

    .card-container {
      perspective: 1200px;
      width: 90vw;
      max-width: 500px;
      aspect-ratio: 5 / 7;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.8s ease;
    }

    /* Auto-flip animation on load */
    .card.auto-flip {
      animation: autoFlip 3s ease 0.5s forwards;
    }

    @keyframes autoFlip {
      0%   { transform: rotateY(0deg); }
      40%  { transform: rotateY(180deg); }
      70%  { transform: rotateY(180deg); }
      100% { transform: rotateY(0deg); }
    }

    .card.flipped {
      transform: rotateY(180deg);
    }

    .card-face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
    }

    .card-face img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .card-front {
      z-index: 2;
    }

    .card-back {
      transform: rotateY(180deg);
    }

    /* Placeholder styles — remove these once you add your images */
    .placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    .card-front .placeholder {
      background: linear-gradient(135deg, #ff6b9d, #c44dff);
    }

    .card-back .placeholder {
      background: linear-gradient(135deg, #4dc9f6, #6c5ce7);
    }
  </style>
</head>
<body>

  <p class="hint">Tap the card to flip it!</p>

  <div class="card-container" onclick="flipCard()">
    <div class="card auto-flip" id="card">

      <div class="card-face card-front">
        <!-- REPLACE: Remove the <div class="placeholder"> below and uncomment the <img> tag -->
        <div class="placeholder">🎉 Front of Card 🎉<br><br>(Replace with your image)</div>
        <!-- <img src="front.png" alt="Invitation Front"> -->
      </div>

      <div class="card-face card-back">
        <!-- REPLACE: Remove the <div class="placeholder"> below and uncomment the <img> tag -->
        <div class="placeholder">🎂 Back of Card 🎂<br><br>(Replace with your image)</div>
        <!-- <img src="back.png" alt="Invitation Back"> -->
      </div>

    </div>
  </div>

  <script>
    const card = document.getElementById('card');
    let flipped = false;
    let ready = false;

    // After the auto-flip animation ends, enable manual flipping
    card.addEventListener('animationend', () => {
      card.classList.remove('auto-flip');
      ready = true;
    });

    function flipCard() {
      if (!ready) return;
      flipped = !flipped;
      card.classList.toggle('flipped', flipped);
    }
  </script>

</body>
</html>
